<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | Luxury Private</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --bg: #fdfaf8; --white: #ffffff; --soft-gold: rgba(212, 175, 55, 0.2); }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding-bottom: 140px; overflow-x: hidden; }

        .header { padding: 30px 20px 5px; text-align: center; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin: 0; color: var(--dark); }

        /* בועת מכתב - התיקון כאן */
        .top-letter-box {
            background: var(--white); border: 1.5px solid var(--gold); border-radius: 12px;
            margin: 10px auto 30px; width: 85%; padding: 15px; position: relative;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.1); text-align: center; min-height: 50px;
        }
        #top-msg { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; margin: 0; color: var(--dark); }

        /* כפתורים זה לצד זה */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { 
            background: var(--white); border-radius: 25px; padding: 40px 10px; text-align: center; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid var(--soft-gold);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:active { transform: scale(0.95); }
        .card .emoji { font-size: 3rem; display: block; margin-bottom: 10px; }
        .card span { font-weight: 600; font-size: 1.1rem; color: var(--dark); }

        /* כפתור דוני זהב */
        .yarden-btn {
            position: fixed; bottom: 135px; left: 25px; background: var(--gold);
            color: var(--white); border: 2px solid var(--white); padding: 12px 28px;
            border-radius: 50px; font-weight: 800; font-size: 1.1rem; z-index: 1001; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* מודאלים */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content { 
            background: var(--white); width: 85%; max-width: 380px; border-radius: 35px; 
            padding: 35px; text-align: center; position: relative;
        }
        .doni-modal { background: linear-gradient(135deg, #fff 0%, #fff9e6 100%); border: 3px solid var(--gold); }
        .close-btn { position: absolute; top: 15px; left: 20px; font-size: 1.5rem; cursor: pointer; color: var(--gold); }
        .dice-icon { font-size: 3.5rem; cursor: pointer; display: inline-block; margin-bottom: 10px; }
        .idea-display { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 20px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .btn-action { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-action.primary { background: var(--gold); color: white; border: none; }

        .list-container { max-height: 300px; overflow-y: auto; text-align: right; }
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }

        /* ניווט תחתון */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: var(--dark); display: flex; justify-content: space-around;
            padding: 18px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); z-index: 1500;
        }
        .nav-link { color: #555; text-align: center; cursor: pointer; font-size: 0.8rem; }
        .nav-link.active { color: var(--gold); }
        .nav-link span { display: block; font-size: 1.6rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header"><h1>Eden & Yarden</h1></div>

    <div class="top-letter-box"><p id="top-msg">טוען מכתב... ✨</p></div>

    <div class="main-grid">
        <div class="card" onclick="openGenerator('home')">
            <span class="emoji">🏡</span><span>בבית</span>
        </div>
        <div class="card" onclick="openGenerator('out')">
            <span class="emoji">🥂</span><span>בחוץ</span>
        </div>
    </div>

    <button class="yarden-btn" onclick="openDoniModal()">דוני 🔐</button>

    <div id="genModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <div class="dice-icon" onclick="reroll()">🎲</div>
            <div class="idea-display" id="ideaText">בוחרים...</div>
            <div class="btn-stack">
                <button class="btn-action" onclick="saveTo('maybe')">להוסיף להתלבטויות 🤔</button>
                <button class="btn-action primary" onclick="saveTo('done')">את זה אנחנו רוצים! ✨</button>
            </div>
        </div>
    </div>

    <div id="doniModal" class="modal">
        <div class="modal-content doni-modal">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <div style="font-size: 3rem; margin-bottom: 10px;">👑</div>
            <h2 style="font-family:'Playfair Display'; color:var(--gold); margin:0;">לעיני דוני בלבד</h2>
            <div id="doniText" class="idea-display" style="font-size: 1.3rem;"></div>
            <button class="btn-action primary" onclick="closeAll()">אין בעיה, אעשה את זה! 👍</button>
        </div>
    </div>

    <div id="listModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <h2 id="listTitle" style="color:var(--gold); font-family:'Playfair Display';">הרשימה</h2>
            <div id="listBody" class="list-container"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link" onclick="showList('maybe')"><span>🤔</span>התלבטויות</div>
        <div class="nav-link" onclick="showList('done')"><span>🎬</span>הדייטים</div>
        <div class="nav-link" onclick="createNewLetter()"><span>📝</span>מכתב</div>
    </nav>

    <script>
        const database = {
            home: ["ערב סושי ביתי", "מרתון סרטים כשהתינוק ישן", "סדנת מסאז' זוגית", "פיקניק לילי במרפסת", "ערב שוקו ומרשמלו", "טעימות יין וגבינות", "משחקי קופסא זוגיים", "סדנת ציור ויין", "ערב שאלות עומק", "בישול ארוחה רומנטית", "ערב קוקטיילים ביתי", "בניית לוח חזון", "פונדו שוקולד ופירות", "ערב פלייליסט נוסטלגי", "ערב פיצה ביתית"],
            out: ["המרינה באשקלון", "הגן הלאומי אשקלון", "גלידה לילית במרינה", "יקב באזור לכיש", "סיור שוק אשקלון", "שקיעה בחוף בר כוכבא", "בירה בבר מקומי", "קפה בוקר מול הים", "טיילת אשקלון החדשה", "מסעדה במרינה", "חוף ניצנים בשקיעה", "נסיעה לחוף זיקים", "ארוחה איטלקית באזור", "קטיף עצמי במושבים", "ערב באולינג"]
        };

        const doniQuotes = ["דוני, היא האישה של חייך. תזכיר לה את זה היום.", "חיבוק של 30 שניות - זו המשימה שלך לעכשיו.", "תזכורת: הודעת 'אהבה' עושה קסמים.", "זכית במישהי מיוחדת במינה."];

        let state = { maybe: [], done: [], lastMsg: "עדן ❤️ ירדן" };
        let currentCat = '', currentIdea = '';

        function getAuth() {
            let k = localStorage.getItem('APP_K'), b = localStorage.getItem('APP_B');
            if (!k) { k = prompt("נא להזין API KEY:"); if(k) localStorage.setItem('APP_K', k); }
            if (!b) { b = prompt("נא להזין BIN ID:"); if(b) localStorage.setItem('APP_B', b); }
            return { apiKey: k, binId: b };
        }

        async function loadData() {
            const keys = getAuth(); if(!keys.apiKey) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${keys.binId}/latest`, { headers: { 'X-Master-Key': keys.apiKey } });
                const result = await res.json();
                state = result.record;
                // עדכון המסך בטעינה
                document.getElementById('top-msg').innerText = state.lastMsg || "כתבו מכתב... ✨";
            } catch (e) { console.error("טעינה נכשלה"); }
        }

        async function saveData() {
            const keys = getAuth();
            // עדכון מיידי של הבועה למעלה
            document.getElementById('top-msg').innerText = state.lastMsg;
            
            // שליחת כל המצב (State) לענן - זה התיקון הקריטי
            await fetch(`https://api.jsonbin.io/v3/b/${keys.binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': keys.apiKey },
                body: JSON.stringify(state)
            });
        }

        function openGenerator(type) {
            currentCat = type; reroll();
            document.getElementById('genModal').style.display = 'flex';
        }

        function reroll() {
            const list = database[currentCat];
            currentIdea = list[Math.floor(Math.random() * list.length)];
            document.getElementById('ideaText').innerText = currentIdea;
            confetti({ particleCount: 60, spread: 70, scalar: 3, shapes: ['circle'], colors: ['#D4AF37'], zIndex: 3000 });
        }

        function saveTo(target) {
            if(!state[target].includes(currentIdea)) state[target].push(currentIdea);
            confetti({ particleCount: 150, spread: 70, shapes: [target === 'done' ? 'heart' : 'circle'], zIndex: 3000 });
            saveData(); closeAll();
        }

        function showList(type) {
            currentCat = type;
            document.getElementById('listTitle').innerText = type === 'maybe' ? 'התלבטויות' : 'הדייטים שלנו';
            const body = document.getElementById('listBody');
            body.innerHTML = state[type].map((item, i) => `
                <div class="list-item"><span>${item}</span><span onclick="deleteItem(${i})" style="cursor:pointer">🗑️</span></div>
            `).join('') || '<p>הרשימה ריקה...</p>';
            document.getElementById('listModal').style.display = 'flex';
        }

        function deleteItem(i) {
            state[currentCat].splice(i, 1);
            saveData(); showList(currentCat);
        }

        function createNewLetter() {
            const msg = prompt("מה לכתוב במכתב שיופיע למעלה?");
            if(msg !== null && msg !== "") {
                state.lastMsg = msg; // מעדכן את המשתנה
                saveData(); // שומר לענן ומעדכן את המסך מיד
            }
        }

        function openDoniModal() {
            const q = doniQuotes[Math.floor(Math.random() * doniQuotes.length)];
            document.getElementById('doniText').innerText = q;
            document.getElementById('doniModal').style.display = 'flex';
            confetti({ particleCount: 100, shapes: ['heart'], colors: ['#ff0000'], zIndex: 3000 });
        }

        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        loadData();
    </script>
</body>
</html>
