<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date | Eden & Yarden</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Assistant:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37; --dark: #1a1a1a; --bg: #fdfaf8; --white: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif; background-color: var(--bg);
            color: var(--dark); margin: 0; padding-bottom: 120px; overflow-x: hidden;
        }

        /* כותרת ומשפט מוטיבציה */
        .top-header { padding: 20px; text-align: right; }
        .names { font-family: 'Playfair Display'; font-size: 1rem; color: var(--gold); margin: 0; }
        .motto { font-size: 0.8rem; font-style: italic; color: #888; }
        h1 { font-family: 'Playfair Display'; font-size: 3.5rem; margin: 0; letter-spacing: -2px; }

        /* בועת הודעות רצה */
        .message-stream {
            background: var(--white); border-radius: 15px; padding: 15px;
            margin: 10px 20px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-right: 4px solid var(--gold); font-size: 0.95rem; min-height: 40px;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .main-wrapper {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px;
        }

        .cat-card {
            background: var(--white); border-radius: 20px; padding: 35px 10px;
            text-align: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(212, 175, 55, 0.1); transition: 0.3s;
        }
        .cat-card:active { transform: scale(0.95); }
        .cat-card .emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .cat-card span { font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; color: var(--dark); }

        /* כפתור ירדן יוקרתי צף */
        .yarden-btn {
            position: fixed; bottom: 100px; left: 20px;
            background: var(--dark); color: var(--gold); border: 2px solid var(--gold);
            width: 70px; height: 70px; border-radius: 50%; font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 99; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* פופ-אפ */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--white); width: 85%; max-width: 350px; border-radius: 30px;
            padding: 25px; text-align: center; position: relative;
        }
        .date-idea-text { font-size: 1.4rem; font-family: 'Playfair Display'; margin: 20px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        
        .nav-btn { background: var(--gold); color: white; border: none; padding: 10px 20px; border-radius: 50px; margin: 5px; cursor: pointer; font-weight: 600; }
        .secondary-btn { background: #f0f0f0; color: #333; }

        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--dark); display: flex; justify-content: space-around;
            padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .nav-item { color: #888; text-align: center; cursor: pointer; font-size: 0.7rem; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="top-header">
        <p class="names">שלום עדן וירדן ❤️</p>
        <p id="daily-motto" class="motto">"זוגיות היא ריקוד של שתי נשמות..."</p>
        <h1>Date</h1>
    </div>

    <div class="message-stream" id="msg-bubble">טוען הודעות אהבה... ✨</div>

    <div class="main-wrapper">
        <div class="cat-card" onclick="openDateGenerator('home')">
            <span class="emoji">🏡</span><span>דייט בבית</span>
        </div>
        <div class="cat-card" onclick="openDateGenerator('out')">
            <span class="emoji">🥂</span><span>יוצאים בחוץ</span>
        </div>
    </div>

    <button class="yarden-btn" onclick="yardenInspiration()">🤴</button>

    <div id="dateModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:15px; left:15px; cursor:pointer;" onclick="closeModal()">✕</span>
            <h3 id="dateCategoryTitle" style="color: var(--gold);">רעיון לדייט</h3>
            <div class="date-idea-text" id="ideaText">טוען רעיון...</div>
            <button class="nav-btn" onclick="nextIdea()">רעיון אחר 🎲</button><br>
            <button class="nav-btn" onclick="saveToMaybe()">נשמע טוב, אולי? 🤔</button>
            <button class="nav-btn secondary-btn" onclick="saveToDone()">זהו, קבענו! ✅</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><span>🏠</span>בית</div>
        <div class="nav-item" onclick="alert('רשימת האולי שלכם בטעינה...')"><span>🤔</span>אולי</div>
        <div class="nav-item" onclick="alert('היסטוריית הדייטים שלנו')"><span>🎬</span>עשינו</div>
        <div class="nav-item" onclick="openLetterWriter()"><span>📝</span>מכתב</div>
    </nav>

    <script>
        const ideas = {
            home: ["ערב סושי ביתי - מכינים ביחד", "קולנוע בסלון עם פופקורן וסדינים", "מרתון משחקי קופסא של פעם", "סדנת ציור ויין בסלון", "ערב שאלות עומק לזוגות", "פיקניק על שטיח בסלון"],
            out: ["פיקניק בשקיעה בחוף הים", "מסעדה שלא הייתם בה בחיים", "ערב באולינג תחרותי", "טיול לילי בעיר העתיקה", "מיני גולף או חדר בריחה", "הופעה חיה בבר קרוב"]
        };

        const yardenPrompts = [
            "ירדן, תסתכל עליה - היא האישה הכי יפה בעולם. תגיד לה את זה עכשיו. ❤️",
            "תזכורת: לקנות זר פרחים קטן בדרך הביתה, סתם כי היא מושלמת. 💐",
            "תביא לה חיבוק ארוך של 20 שניות, זה כל מה שהיא צריכה. 🫂",
            "שלח לה עכשיו הודעה: 'זכיתי בך כאשתי, את חכמה ומיוחדת'. 📱",
            "נשיקה על המצח וסידור הבית - זה הדייט הכי טוב. 💋"
        ];

        let currentCategory = [];
        let ideaIndex = 0;

        function openDateGenerator(type) {
            currentCategory = ideas[type];
            ideaIndex = Math.floor(Math.random() * currentCategory.length);
            document.getElementById('dateCategoryTitle').innerText = type === 'home' ? 'דייט ביתי' : 'דייט בחוץ';
            document.getElementById('ideaText').innerText = currentCategory[ideaIndex];
            document.getElementById('dateModal').style.display = 'flex';
            confetti({ particleCount: 50, spread: 60, colors: ['#D4AF37'] });
        }

        function nextIdea() {
            ideaIndex = (ideaIndex + 1) % currentCategory.length;
            document.getElementById('ideaText').innerText = currentCategory[ideaIndex];
        }

        function yardenInspiration() {
            const prompt = yardenPrompts[Math.floor(Math.random() * yardenPrompts.length)];
            alert(prompt);
            confetti({ particleCount: 200, spread: 100, scalar: 2, shapes: ['heart'], colors: ['#ff0000', '#D4AF37'] });
        }

        function closeModal() { document.getElementById('dateModal').style.display = 'none'; }

        // פונקציות עתידיות לסנכרון יתווספו כאן
        function openLetterWriter() {
            const msg = prompt("כתבי הודעה קצרה שתופיע למעלה:");
            if(msg) {
                document.getElementById('msg-bubble').innerText = msg;
                // כאן יבוא הקוד של שמירה ל-JSONBin
            }
        }
    </script>
</body>
</html>
