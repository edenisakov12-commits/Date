<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden Love App</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffccd5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--soft-pink), #fff5f7);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { color: var(--primary-pink); }

        button {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover { transform: scale(1.05); }

        #status { margin-top: 15px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <h1>האפליקציה של עדן וירדן ❤️</h1>
        <p>לחצו על הכפתור כדי לשלוח אהבה לענן!</p>
        <button onclick="sendLove()">שלח אהבה + קונפטי!</button>
        <div id="status">ממתין לפעולה...</div>
    </div>

    <script>
        // פונקציה לקבלת מפתחות מהמשתמש אם הם לא קיימים
        function getKeys() {
            let apiKey = localStorage.getItem('JB_API_KEY');
            let binId = localStorage.getItem('JB_BIN_ID');

            if (!apiKey) {
                apiKey = prompt("נא להזין API KEY (חד פעמי):");
                if (apiKey) localStorage.setItem('JB_API_KEY', apiKey);
            }
            if (!binId) {
                binId = prompt("נא להזין BIN ID (חד פעמי):");
                if (binId) localStorage.setItem('JB_BIN_ID', binId);
            }

            return { apiKey, binId };
        }

        async function sendLove() {
            const { apiKey, binId } = getKeys();
            if (!apiKey || !binId) return alert("חובה להזין מפתחות כדי לעבוד!");

            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "שולח נתונים לענן...";

            // הפעלת קונפטי
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffccd5', '#ff8fa3']
            });

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': apiKey
                    },
                    body: JSON.stringify({ 
                        last_interaction: new Date().toLocaleString(),
                        message: "Love sent!" 
                    })
                });

                if (response.ok) {
                    statusDiv.innerText = "הנתונים נשמרו בהצלחה! ✨";
                } else {
                    throw new Error("שגיאה בשמירה");
                }
            } catch (error) {
                statusDiv.innerText = "אופס! הייתה בעיה בחיבור לענן.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
