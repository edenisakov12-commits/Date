<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | Soul & Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --bg: #fdfaf8; --white: #ffffff; --soft-gold: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding-bottom: 150px; overflow-x: hidden; }

        .header { padding: 35px 20px 10px; text-align: center; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.6rem; letter-spacing: -1px; }

        /* סרגל קיצורי דרך לוואטסאפ */
        .parent-shortcuts {
            display: flex; justify-content: space-around; gap: 10px;
            margin: 10px auto 30px; padding: 20px 10px; width: 90%;
            background: var(--white); border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--soft-gold);
        }
        .shortcut-btn {
            cursor: pointer; transition: all 0.2s ease;
            display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1;
        }
        .shortcut-btn .icon-circle {
            width: 50px; height: 50px; background: var(--bg); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            border: 1px solid var(--soft-gold);
        }
        .shortcut-btn span { font-size: 0.75rem; font-weight: 600; color: var(--dark); }
        .shortcut-btn:active { transform: translateY(3px); }

        /* כפתורי דייטים */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { 
            background: var(--white); border-radius: 28px; padding: 45px 10px; text-align: center; 
            cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid var(--soft-gold);
            transition: 0.3s;
        }
        .card .emoji { font-size: 3.2rem; display: block; margin-bottom: 12px; }
        .card span { font-weight: 600; font-size: 1.1rem; }

        /* כפתור דוני הזוהר בבר התחתון */
        .doni-nav-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); 
            color: white; border-radius: 50%;
            width: 75px; height: 75px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            position: relative; top: -20px;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6);
            animation: pulse-gold 2s infinite;
            border: 4px solid var(--white);
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); transform: scale(1); }
            50% { transform: scale(1.05); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); transform: scale(1); }
        }

        /* ניווט תחתון */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: var(--dark); display: flex; justify-content: space-around; align-items: center;
            padding: 10px 10px; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 1500;
            height: 70px;
        }
        .nav-link { color: #888; text-align: center; cursor: pointer; font-size: 0.8rem; flex: 1; }
        .nav-link span { display: block; font-size: 1.7rem; margin-bottom: 2px; }

        /* מודאלים */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content { 
            background: var(--white); width: 85%; max-width: 380px; border-radius: 40px; 
            padding: 40px 30px; text-align: center; position: relative;
        }
        .close-btn { position: absolute; top: 20px; left: 25px; font-size: 1.6rem; cursor: pointer; color: var(--gold); }
        
        .doni-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.8rem; margin: 10px 0; }
        #doniText { font-size: 1.3rem; line-height: 1.5; margin: 25px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; font-style: italic; }
    </style>
</head>
<body>

    <div class="header"><h1>Eden & Yarden</h1></div>

    <div class="parent-shortcuts">
        <div class="shortcut-btn" onclick="shareWhatsApp('baby')">
            <div class="icon-circle">🍼</div><span>מטרנה</span>
        </div>
        <div class="shortcut-btn" onclick="shareWhatsApp('milk')">
            <div class="icon-circle">🥛</div><span>חלב</span>
        </div>
        <div class="shortcut-btn" onclick="shareWhatsApp('home')">
            <div class="icon-circle">🏠</div><span>בדרך?</span>
        </div>
        <div class="shortcut-btn" onclick="shareWhatsApp('love')">
            <div class="icon-circle">❤️</div><span>אוהבת</span>
        </div>
    </div>

    <div class="main-grid">
        <div class="card" onclick="openGenerator('home')">
            <span class="emoji">🏡</span><span>דייט בבית</span>
        </div>
        <div class="card" onclick="openGenerator('out')">
            <span class="emoji">🥂</span><span>בחוץ</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link" onclick="showList('maybe')"><span>🤔</span>התלבטויות</div>
        <div class="doni-nav-btn" onclick="openDoniModal()">דוני</div>
        <div class="nav-link" onclick="showList('done')"><span>🎬</span>הדייטים</div>
    </nav>

    <div id="doniModal" class="modal">
        <div class="modal-content" style="border-top: 6px solid var(--gold);">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <div style="font-size:3rem; margin-bottom: 5px;">👑</div>
            <div class="doni-title">מסר מהלב לעדן</div>
            <div id="doniText"></div>
            <button style="background:var(--dark); color:var(--gold); border:1px solid var(--gold); padding:16px; border-radius:50px; width:100%; font-weight:bold; cursor:pointer;" onclick="closeAll()">אני איתך בזה, אהובתי ❤️</button>
        </div>
    </div>

    <div id="genModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <div style="font-size:4rem; cursor:pointer;" onclick="reroll()">🎲</div>
            <div id="ideaText" style="font-family:'Playfair Display'; font-size:1.6rem; margin:25px 0; min-height:100px; display:flex; align-items:center; justify-content:center;"></div>
            <button style="background:var(--gold); color:white; border:none; padding:18px; border-radius:50px; width:100%; font-weight:bold; font-size:1.1rem;" onclick="saveTo('done')">זה הדייט שלנו! ✨</button>
        </div>
    </div>

    <div id="listModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <h2 id="listTitle" style="color:var(--gold); font-family:'Playfair Display';">הרשימה</h2>
            <div id="listBody" style="max-height:350px; overflow-y:auto; text-align:right; margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const database = {
            home: ["ערב סושי ויין", "מרתון סרטים שקט", "ספא ביתי עם עיסוי", "פיקניק על השטיח בסלון", "ערב טעימות גבינות", "שיחה עמוקה מול הנרות", "סדנת ציור משותפת"],
            out: ["המרינה באשקלון", "הגן הלאומי בשקיעה", "גלידה וסיבוב בחוף", "מסעדה רומנטית באזור", "טיול לילה בטיילת", "צפייה בכוכבים בדיונות"]
        };

        const doniQuotes = [
            "דוני, תסתכל עליה. היא לא רק אשתו של חייך, היא האמא של הילד שלך. תזכיר לה היום כמה היא גיבורה.",
            "לפעמים בתוך השגרה של החיתולים והעבודה, קל לשכוח - היא החברה הכי טובה שלך. תן לה נשיקה ארוכה היום.",
            "דוני, תזכורת: עדן צריכה לדעת שהיא עדיין האישה הכי יפה בעולם בעיניים שלך. תגיד לה את זה עכשיו.",
            "הבית שלכם הוא המבצר שלכם. תודה לה על כל האהבה שהיא מכניסה בו כל יום.",
            "להיות הורים זה אתגר, אבל לעשות את זה איתה? זה הפרס הכי גדול שקיבלת.",
            "קח נשימה עמוקה. תסתכל על רום ועל עדן. זכית בכל הקופה, דוני.",
            "משימה לדוני: היום בערב, כשהקטן ישן, תכין לה תה או יין ותקשיב לה 10 דקות בלי טלפון.",
            "היא הלב של הבית הזה. אל תיתן ליום לעבור בלי שהיא תרגיש את זה."
        ];

        let quotePool = [...doniQuotes];

        function shareWhatsApp(type) {
            let text = "";
            if(type === 'baby') text = "היי, רום רעב! 🍼 צריך להביא מטרנה בהקדם 🍼🍼🍼";
            if(type === 'milk') text = "לא לשכוח להביא חלב בדרך הביתה! 🥛🛒 שיהיה לנו לקפה של הבוקר ☕";
            if(type === 'home') text = "מתי את/ה מגיע/ה? מחכים בבית בגעגועים! 🏠❤️";
            if(type === 'love') {
                const loves = ["סתם רציתי להגיד שאני אוהבת אותך הכי בעולם ❤️", "אתה אבא מדהים ובעל מושלם, תודה על הכל ✨", "מחכה כבר לזמן שלנו יחד בערב... 🥰"];
                text = loves[Math.floor(Math.random() * loves.length)];
            }
            // שימוש ב-send ללא מספר טלפון כדי לאפשר בחירת איש קשר
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        let state = JSON.parse(localStorage.getItem('EY_SAVED_LISTS')) || { maybe: [], done: [] };

        function openGenerator(type) {
            currentCat = type; reroll();
            document.getElementById('genModal').style.display = 'flex';
        }

        function reroll() {
            const list = database[currentCat] || ["עוד רעיונות בקרוב..."];
            currentIdea = list[Math.floor(Math.random() * list.length)];
            document.getElementById('ideaText').innerText = currentIdea;
            confetti({ particleCount: 50, spread: 60, colors: ['#D4AF37'], zIndex: 3000 });
        }

        function saveTo(target) {
            state[target].push(currentIdea);
            localStorage.setItem('EY_SAVED_LISTS', JSON.stringify(state));
            confetti({ particleCount: 150, shapes: ['heart'], zIndex: 3000 });
            closeAll();
        }

        function openDoniModal() {
            if (quotePool.length === 0) quotePool = [...doniQuotes];
            const randomIndex = Math.floor(Math.random() * quotePool.length);
            const quote = quotePool.splice(randomIndex, 1)[0];
            document.getElementById('doniText').innerText = quote;
            document.getElementById('doniModal').style.display = 'flex';
            confetti({ particleCount: 100, shapes: ['heart'], colors: ['#ff0000', '#D4AF37'], zIndex: 3000 });
        }

        function showList(type) {
            document.getElementById('listTitle').innerText = type === 'maybe' ? 'התלבטויות' : 'הדייטים שלנו';
            document.getElementById('listBody').innerHTML = state[type].map((item, i) => `
                <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                    <span>${item}</span>
                    <span style="color:#ccc; cursor:pointer;" onclick="deleteItem('${type}', ${i})">🗑️</span>
                </div>
            `).join('') || "<p style='text-align:center; opacity:0.5;'>אין פריטים עדיין...</p>";
            document.getElementById('listModal').style.display = 'flex';
        }

        function deleteItem(type, i) {
            state[type].splice(i, 1);
            localStorage.setItem('EY_SAVED_LISTS', JSON.stringify(state));
            showList(type);
        }

        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
