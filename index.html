<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | Private App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Assistant:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37; --dark: #1a1a1a; --bg: #fdfaf8; --white: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif; background-color: var(--bg);
            color: var(--dark); margin: 0; padding-bottom: 120px; overflow-x: hidden;
        }

        /* כותרת חדשה ויוקרתית */
        .top-header { padding: 40px 20px 20px; text-align: center; }
        .names { font-family: 'Playfair Display'; font-size: 2.8rem; color: var(--dark); margin: 0; letter-spacing: -1px; }
        .motto { font-size: 0.9rem; font-style: italic; color: var(--gold); margin-top: 5px; opacity: 0.8; }

        /* בועת הודעות */
        .message-stream {
            background: var(--white); border-radius: 20px; padding: 18px;
            margin: 10px 25px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border-right: 4px solid var(--gold); text-align: center; font-style: italic;
        }

        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 25px; }

        .cat-card {
            background: var(--white); border-radius: 20px; padding: 35px 10px;
            text-align: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(212, 175, 55, 0.1); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cat-card:active { transform: scale(0.95); }
        .cat-card .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }
        .cat-card span { font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; color: var(--dark); text-transform: uppercase; }

        /* כפתור ירדן המעודכן */
        .yarden-floating-btn {
            position: fixed; bottom: 110px; left: 20px;
            background: var(--dark); color: var(--gold); border: 1px solid var(--gold);
            padding: 12px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 99; cursor: pointer;
        }

        /* מודאלים */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--white); width: 85%; max-width: 360px; border-radius: 30px;
            padding: 30px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .close-btn { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; cursor: pointer; color: var(--gold); }
        
        .idea-display { font-size: 1.5rem; font-family: 'Playfair Display'; margin: 30px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        
        .action-btn { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); padding: 12px 25px; border-radius: 50px; margin: 8px 0; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .action-btn:active { background: var(--gold); color: white; }
        .secondary-btn { background: #f8f8f8; color: #666; border: none; font-size: 0.8rem; }

        .list-container { max-height: 300px; overflow-y: auto; text-align: right; }
        .list-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .delete-icon { color: #ff4d4d; font-size: 0.8rem; cursor: pointer; }

        /* ניווט תחתון */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--dark); display: flex; justify-content: space-around;
            padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .nav-item { color: #666; text-align: center; cursor: pointer; font-size: 0.7rem; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="top-header">
        <h1 class="names">Eden & Yarden</h1>
        <p id="daily-motto" class="motto">"בונים את האימפריה שלנו, צעד אחר צעד."</p>
    </div>

    <div class="message-stream" id="msg-bubble">הודעה אחרונה: מחכה לסנכרון... ✨</div>

    <div class="main-wrapper">
        <div class="cat-card" onclick="openGenerator('home')">
            <span class="emoji">🏡</span><span>בבית</span>
        </div>
        <div class="cat-card" onclick="openGenerator('out')">
            <span class="emoji">🥂</span><span>בחוץ</span>
        </div>
    </div>

    <button class="yarden-floating-btn" onclick="yardenInspiration()">לעיני ירדן בלבד 🔐</button>

    <div id="dateModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <h3 id="modalTitle" style="color: var(--gold); font-family: 'Playfair Display';">רעיון לדייט</h3>
            <div class="idea-display" id="ideaText">בוחרים לכם משהו מיוחד...</div>
            <button class="action-btn" onclick="nextIdea()">רעיון אחר 🎲</button>
            <button class="action-btn" onclick="saveToMaybe()">אולי בפעם אחרת 🤔</button>
            <button class="action-btn" onclick="saveToDone()">את זה אנחנו רוצים! ✨</button>
        </div>
    </div>

    <div id="listModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <h3 id="listTitle" style="color: var(--gold); font-family: 'Playfair Display';">רשימה</h3>
            <div id="listBody" class="list-container"></div>
            <button class="action-btn secondary-btn" style="margin-top:20px" onclick="clearList()">איפוס רשימה</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><span>🏠</span>בית</div>
        <div class="nav-item" onclick="openListView('maybe')"><span>🤔</span>התלבטויות</div>
        <div class="nav-item" onclick="openListView('done')"><span>🎬</span>הדייטים שלנו</div>
        <div class="nav-item" onclick="writeMessage()"><span>📝</span>מכתב</div>
    </nav>

    <script>
        const ideas = {
            home: ["סדנת שוקולד ביתית", "ערב משחקי ילדות", "קמפינג בסלון עם מרשמלו", "בניית לוח חזון משותף", "ערב פונדו ומוזיקה שקטה", "תחרות בישול זוגית"],
            out: ["טיפוס קירות זוגי", "שקיעה עם יין בנמל", "סיור טעימות בשוק", "סרט בדרייב-אין", "החלקה על הקרח", "טיול לילה בטבע"]
        };

        const yardenPrompts = [
            "ירדן, היא מחכה לחיבוק ממך. עכשיו.",
            "תזכיר לה כמה היא חכמה ומיוחדת, זה יאיר לה את היום.",
            "פרחים ביום חול הם הפרחים הכי יפים. תחשוב על זה.",
            "זכית באישה מושלמת. אל תשכח להגיד לה תודה.",
            "הודעת אהבה קטנה עכשיו תעשה שינוי גדול."
        ];

        let appData = JSON.parse(localStorage.getItem('EDEN_YARDEN_DATA')) || { maybe: [], done: [], lastMsg: "עדן ❤️ ירדן" };
        let currentType = '';
        let currentIdea = '';

        function updateUI() {
            document.getElementById('msg-bubble').innerText = appData.lastMsg;
            localStorage.setItem('EDEN_YARDEN_DATA', JSON.stringify(appData));
            // כאן אפשר להוסיף saveToCloud() לסינכרון מלא
        }

        function openGenerator(type) {
            currentType = type;
            nextIdea();
            document.getElementById('dateModal').style.display = 'flex';
        }

        function nextIdea() {
            const list = ideas[currentType];
            currentIdea = list[Math.floor(Math.random() * list.length)];
            document.getElementById('ideaText').innerText = currentIdea;
        }

        function saveToMaybe() {
            if(!appData.maybe.includes(currentIdea)) appData.maybe.push(currentIdea);
            animateFeedback(['🤔', '💭', '📝']);
            updateUI();
            closeModal();
        }

        function saveToDone() {
            if(!appData.done.includes(currentIdea)) appData.done.push(currentIdea);
            animateFeedback(['✨', '❤️', '🥂']);
            confetti({ particleCount: 100, spread: 70, colors: ['#D4AF37', '#000000'] });
            updateUI();
            closeModal();
        }

        function openListView(type) {
            currentType = type;
            const title = type === 'maybe' ? 'התלבטויות שלנו' : 'הדייטים שלנו';
            const list = appData[type];
            document.getElementById('listTitle').innerText = title;
            document.getElementById('listBody').innerHTML = list.length ? list.map((item, i) => `
                <div class="list-item">
                    <span>${item}</span>
                    <span class="delete-icon" onclick="deleteFromList(${i})">🗑️</span>
                </div>
            `).join('') : '<p style="text-align:center; opacity:0.5">הרשימה ריקה...</p>';
            document.getElementById('listModal').style.display = 'flex';
        }

        function deleteFromList(index) {
            appData[currentType].splice(index, 1);
            openListView(currentType);
            updateUI();
        }

        function clearList() {
            if(confirm("למחוק הכל?")) {
                appData[currentType] = [];
                openListView(currentType);
                updateUI();
            }
        }

        function writeMessage() {
            const msg = prompt("כתבי הודעה קצרה לירדן:");
            if(msg) {
                appData.lastMsg = msg;
                updateUI();
            }
        }

        function yardenInspiration() {
            const p = yardenPrompts[Math.floor(Math.random() * yardenPrompts.length)];
            alert(p);
            confetti({ particleCount: 150, spread: 80, shapes: ['heart'], colors: ['#ff0000', '#D4AF37'] });
        }

        function animateFeedback(emojis) {
            // פונקציית עזר להקפצת אימוג'ים - לצורך הפשטות נשתמש בקונפטי מותאם
            confetti({ particleCount: 40, spread: 50, origin: { y: 0.7 }, scalar: 2 });
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        updateUI();
    </script>
</body>
</html>
