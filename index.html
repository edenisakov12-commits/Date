<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | The Private App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --gold: #D4AF37; 
            --dark: #1a1a1a; 
            --bg: #fdfaf8; 
            --white: #ffffff;
            --soft-gold: rgba(212, 175, 55, 0.1);
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg); 
            color: var(--dark); 
            margin: 0; 
            padding-bottom: 120px; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* כותרת יוקרתית */
        .header { 
            padding: 40px 20px 10px; 
            text-align: center; 
        }
        .header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.6rem; 
            margin: 0; 
            letter-spacing: -1px; 
            font-weight: 700;
        }

        /* בועת הודעה קומפקטית למעלה */
        .top-message-container {
            background: var(--white);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            margin: 10px auto 25px;
            width: 80%;
            max-width: 350px;
            padding: 15px;
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
            text-align: center;
        }
        .top-message-container::after {
            content: '✉️';
            position: absolute;
            top: -12px;
            right: 20px;
            background: var(--bg);
            padding: 0 8px;
            font-size: 1rem;
        }
        #top-msg { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 1rem; 
            color: var(--dark);
            margin: 0;
        }

        /* גריד כרטיסיות ראשי */
        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            padding: 0 25px; 
        }
        .card { 
            background: var(--white); 
            border-radius: 25px; 
            padding: 35px 15px; 
            text-align: center; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
            border: 1px solid var(--soft-gold);
            transition: all 0.3s ease;
        }
        .card:active { transform: scale(0.95); background-color: var(--bg); }
        .card .emoji { font-size: 2.8rem; display: block; margin-bottom: 12px; }
        .card span { 
            font-weight: 600; 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
            text-transform: uppercase;
            color: var(--dark);
        }

        /* כפתור דוני הצף */
        .yarden-btn {
            position: fixed; 
            bottom: 110px; 
            left: 25px; 
            background: var(--dark);
            color: var(--gold); 
            border: 1px solid var(--gold); 
            padding: 14px 22px;
            border-radius: 50px; 
            font-weight: 600; 
            font-size: 0.85rem; 
            z-index: 99; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            letter-spacing: 0.5px;
        }

        /* מודאלים (Pop-ups) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(12px); 
            z-index: 1000;
            justify-content: center; 
            align-items: center;
        }
        .modal-content { 
            background: var(--white); 
            width: 88%; 
            max-width: 400px; 
            border-radius: 35px; 
            padding: 35px; 
            text-align: center; 
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .close-btn { 
            position: absolute; 
            top: 20px; 
            left: 25px; 
            font-size: 1.4rem; 
            cursor: pointer; 
            color: var(--gold); 
        }
        
        /* תצוגת רעיון לדייט */
        .dice-icon { 
            font-size: 3rem; 
            cursor: pointer; 
            display: inline-block; 
            margin-bottom: 10px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dice-icon:hover { transform: rotate(180deg); }
        
        .idea-display { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.6rem; 
            margin: 25px 0; 
            min-height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            line-height: 1.4; 
            color: var(--dark);
        }
        
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .btn-action { 
            background: var(--dark); 
            color: var(--gold); 
            border: 1px solid var(--gold); 
            padding: 16px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-action.primary { background: var(--gold); color: white; }

        /* ניהול רשימות */
        .list-container { 
            max-height: 300px; 
            overflow-y: auto; 
            text-align: right; 
            margin: 20px 0;
            padding-left: 10px;
        }
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #f2f2f2; 
        }
        .list-item span { font-size: 0.95rem; flex: 1; margin-left: 10px; }
        .trash-btn { color: #ff4d4d; cursor: pointer; padding: 5px; font-size: 1.1rem; }

        /* ניווט תחתון */
        .bottom-nav {
            position: fixed; 
            bottom: 25px; left: 20px; right: 20px;
            background: var(--dark); 
            display: flex; 
            justify-content: space-around;
            padding: 18px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .nav-link { color: #666; text-align: center; cursor: pointer; font-size: 0.75rem; text-decoration: none; }
        .nav-link.active { color: var(--gold); }
        .nav-link span { display: block; font-size: 1.6rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Eden & Yarden</h1>
    </div>

    <div class="top-message-container">
        <p id="top-msg">טוען את המכתב שלכם... ✨</p>
    </div>

    <div class="main-grid">
        <div class="card" onclick="openGenerator('home')">
            <span class="emoji">🏡</span><span>דייט בבית</span>
        </div>
        <div class="card" onclick="openGenerator('out')">
            <span class="emoji">🥂</span><span>יוצאים בחוץ</span>
        </div>
    </div>

    <button class="yarden-btn" onclick="yardenMagic()">דוני תלחץ עליי 🔐</button>

    <div id="genModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <div class="dice-icon" onclick="reroll()">🎲</div>
            <div class="idea-display" id="ideaText">טוען...</div>
            <div class="btn-stack">
                <button class="btn-action" onclick="saveTo('maybe')">להוסיף להתלבטויות 🤔</button>
                <button class="btn-action primary" onclick="saveTo('done')">את זה אנחנו רוצים! ✨</button>
            </div>
        </div>
    </div>

    <div id="listModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <h2 id="listTitle" style="color:var(--gold); font-family:'Playfair Display';">הרשימה</h2>
            <div id="listBody" class="list-container"></div>
            <button class="btn-action" style="font-size:0.8rem; padding:10px;" onclick="clearCurrentList()">איפוס רשימה</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link" onclick="showList('maybe')"><span>🤔</span>התלבטויות</div>
        <div class="nav-link" onclick="showList('done')"><span>🎬</span>הדייטים שלנו</div>
        <div class="nav-link" onclick="createNewLetter()"><span>📝</span>מכתב</div>
    </nav>

    <script>
        // בנק רעיונות מורחב (50+)
        const database = {
            home: [
                "סדנת שוקולד ויין בסלון", "ערב קוקטיילים ותחרות בישול", "מרתון סרטים עם פופקורן גורמה", 
                "ערב שאלות עומק לזוגיות", "ספא ביתי עם עיסויים ושמנים", "בניית לוח חזון משותף לעתיד", 
                "סדנת ציור זוגית על קנבס", "פיקניק על השטיח בסלון", "ערב טעימות גבינות עולם", 
                "סדנת סושי ביתית מאפס", "משחקי קופסא נוסטלגיים", "ערב קריוקי בסלון", 
                "תחרות אפיית קינוחים", "בניית פאזל 1000 חלקים ביחד", "ערב צילום ביתי אומנותי", 
                "סדנת פיצה איטלקית", "שיחה על זכרונות מילדות", "ערב פלייליסט נוסטלגי", 
                "סדנת מקרמה או יצירה", "ערב פונדו שוקולד ופירות", "תחרות טריוויה זוגית", 
                "ערב שוקו ומרשמלו מול סרט", "שיעור יוגה זוגי", "בניית תפריט לדייט הבא", 
                "קריאת ספר משותפת במיטה", "ערב טעימות יין עיוור", "משחקי וידאו של פעם"
            ],
            out: [
                "טיול יקבים וטעימות גבינות", "טיסת חוויה בשמי הארץ", "סיור קולינרי בשוק בלילה", 
                "לילה בצימר בוטיק יוקרתי", "הופעה חיה בקיסריה או שוני", "פיקניק שקיעה על צוק בים", 
                "טיול סוסים רומנטי בשקיעה", "חדר בריחה מאתגר במיוחד", "סדנת קרמיקה זוגית", 
                "החלקה על הקרח", "צניחה חופשית (לאמיצים)", "טיול ג'יפים לילי", 
                "ערב באולינג תחרותי", "קטיף עצמי של פירות", "צפייה בכוכבים במצפה רמון", 
                "ארוחה במסעדת שף", "ספא במלון יוקרה", "טיול אופניים זוגי בנמל", 
                "מופע סטנדאפ קורע", "סדנת צילום רחוב", "סיור במוזיאון בשעות הלילה", 
                "קמפינג תחת כיפת השמיים", "טיול בסמטאות יפו העתיקה", "ערב ג'אז במועדון קטן", 
                "סדנת נגרות זוגית", "טיפוס קירות זוגי", "שייט רומנטי בכנרת"
            ]
        };

        const yardenPrompts = [
            "דוני, תזכיר לה כמה היא יפה היום.",
            "היא האישה המושלמת עבורך, אל תשכח להגיד לה תודה.",
            "תביא לה חיבוק ארוך של 30 שניות - עכשיו.",
            "הודעת אהבה קטנה ביום רגיל עושה את כל ההבדל.",
            "זכית בה, והיא זכתה בך. תהיה הגבר שהיא אוהבת."
        ];

        let state = { maybe: [], done: [], lastMsg: "עדן ❤️ ירדן" };
        let currentCat = '', currentIdea = '';

        // פונקציות סנכרון ענן (JSONBin)
        function getKeys() {
            let k = localStorage.getItem('APP_K'), b = localStorage.getItem('APP_B');
            if (!k) { k = prompt("נא להזין API KEY (חד-פעמי):"); if(k) localStorage.setItem('APP_K', k); }
            if (!b) { b = prompt("נא להזין BIN ID (חד-פעמי):"); if(b) localStorage.setItem('APP_B', b); }
            return { apiKey: k, binId: b };
        }

        async function loadData() {
            const keys = getKeys(); if(!keys.apiKey) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${keys.binId}/latest`, {
                    headers: { 'X-Master-Key': keys.apiKey }
                });
                const result = await res.json();
                state = result.record;
                document.getElementById('top-msg').innerText = state.lastMsg;
            } catch (e) { console.error("טעינה נכשלה"); }
        }

        async function saveData() {
            const keys = getKeys();
            await fetch(`https://api.jsonbin.io/v3/b/${keys.binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': keys.apiKey },
                body: JSON.stringify(state)
            });
            document.getElementById('top-msg').innerText = state.lastMsg;
        }

        // לוגיקת מחולל דייטים
        function openGenerator(type) {
            currentCat = type;
            reroll();
            document.getElementById('genModal').style.display = 'flex';
        }

        function reroll() {
            const list = database[currentCat];
            currentIdea = list[Math.floor(Math.random() * list.length)];
            document.getElementById('ideaText').innerText = currentIdea;
            // אפקט קוביות קופצות
            confetti({ particleCount: 50, spread: 60, scalar: 2, shapes: ['circle'], colors: ['#D4AF37', '#000000'] });
        }

        function saveTo(target) {
            if(!state[target].includes(currentIdea)) state[target].push(currentIdea);
            confetti({ 
                particleCount: 100, 
                spread: 70, 
                shapes: [target === 'done' ? 'heart' : 'circle'],
                colors: [target === 'done' ? '#ff0000' : '#D4AF37']
            });
            saveData();
            closeAll();
        }

        // לוגיקת רשימות
        function showList(type) {
            currentCat = type;
            document.getElementById('listTitle').innerText = type === 'maybe' ? 'התלבטויות' : 'הדייטים שלנו';
            const body = document.getElementById('listBody');
            body.innerHTML = state[type].length ? state[type].map((item, i) => `
                <div class="list-item">
                    <span>${item}</span>
                    <span class="trash-btn" onclick="deleteItem(${i})">🗑️</span>
                </div>
            `).join('') : '<p style="text-align:center; opacity:0.5">אין פריטים ברשימה...</p>';
            document.getElementById('listModal').style.display = 'flex';
        }

        function deleteItem(i) {
            state[currentCat].splice(i, 1);
            saveData();
            showList(currentCat);
        }

        function clearCurrentList() {
            if(confirm("למחוק את כל הרשימה?")) {
                state[currentCat] = [];
                saveData();
                showList(currentCat);
            }
        }

        // הודעות ומכתבים
        function createNewLetter() {
            const msg = prompt("כתבי הודעה אישית שתופיע למעלה:");
            if(msg) {
                state.lastMsg = msg;
                saveData();
            }
        }

        function yardenMagic() {
            const q = yardenPrompts[Math.floor(Math.random() * yardenPrompts.length)];
            alert(q);
            confetti({ particleCount: 150, shapes: ['heart'], colors: ['#ff0000', '#D4AF37'] });
        }

        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        // טעינה ראשונית
        loadData();
    </script>
</body>
</html>
