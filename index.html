<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | Soul & Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --bg: #fdfaf8; --white: #ffffff; --soft-gold: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding-bottom: 150px; overflow-x: hidden; }

        .header { padding: 35px 20px 10px; text-align: center; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.6rem; letter-spacing: -1px; }

        /* סרגל קיצורי דרך */
        .parent-shortcuts {
            display: flex; justify-content: space-around; gap: 10px;
            margin: 10px auto 30px; padding: 20px 10px; width: 90%;
            background: var(--white); border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--soft-gold);
        }
        .shortcut-btn { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .shortcut-btn .icon-circle {
            width: 45px; height: 45px; background: var(--bg); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            border: 1px solid var(--soft-gold);
        }
        .shortcut-btn span { font-size: 0.75rem; font-weight: 600; }

        /* גריד כפתורים ראשי - 3 בשורה */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            padding: 0 15px; 
        }
        .card { 
            background: var(--white); border-radius: 20px; padding: 25px 5px; text-align: center; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid var(--soft-gold);
            transition: 0.3s;
        }
        .card .emoji { font-size: 2.2rem; display: block; margin-bottom: 8px; }
        .card span { font-weight: 600; font-size: 0.9rem; line-height: 1.2; display: block; }

        /* כפתור דוני */
        .doni-nav-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); 
            color: white; border-radius: 50%;
            width: 75px; height: 75px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            position: relative; top: -20px;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6);
            animation: pulse-gold 2s infinite;
            border: 4px solid var(--white);
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); transform: scale(1); }
            50% { transform: scale(1.05); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); transform: scale(1); }
        }

        .bottom-nav {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: var(--dark); display: flex; justify-content: space-around; align-items: center;
            padding: 10px 10px; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 1500;
            height: 70px;
        }
        .nav-link { color: #888; text-align: center; cursor: pointer; font-size: 0.8rem; flex: 1; }
        .nav-link span { display: block; font-size: 1.6rem; margin-bottom: 2px; }

        /* מודאלים */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content { 
            background: var(--white); width: 85%; max-width: 380px; border-radius: 40px; 
            padding: 40px 30px; text-align: center; position: relative;
        }
        .close-btn { position: absolute; top: 20px; left: 25px; font-size: 1.6rem; cursor: pointer; color: var(--gold); }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn-modal { padding: 16px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; }
        
        .list-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; text-align: right; gap: 10px; }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-size: 1.2rem; }

        #ideaText, #doniText { font-size: 1.3rem; line-height: 1.5; margin: 25px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header"><h1>Eden & Yarden</h1></div>

    <div class="parent-shortcuts">
        <div class="shortcut-btn" onclick="shareWhatsApp('baby')"><div class="icon-circle">🍼</div><span>מטרנה</span></div>
        <div class="shortcut-btn" onclick="shareWhatsApp('milk')"><div class="icon-circle">🥛</div><span>חלב</span></div>
        <div class="shortcut-btn" onclick="shareWhatsApp('home')"><div class="icon-circle">🏠</div><span>בדרך?</span></div>
        <div class="shortcut-btn" onclick="shareWhatsApp('love')"><div class="icon-circle">❤️</div><span>אהבה</span></div>
    </div>

    <div class="main-grid">
        <div class="card" onclick="openGenerator('home')"><span class="emoji">🏡</span><span>דייט בבית</span></div>
        <div class="card" onclick="openGenerator('out')"><span class="emoji">🥂</span><span>דייט בחוץ</span></div>
        <div class="card" onclick="openGenerator('spicy')"><span class="emoji">🎭</span><span>משחקים</span></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link" onclick="showList('maybe')"><span>🤔</span>התלבטויות</div>
        <div class="doni-nav-btn" onclick="openDoniModal()">דוני</div>
        <div class="nav-link" onclick="showList('done')"><span>🎬</span>הדייטים</div>
    </nav>

    <div id="genModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <div style="font-size:3.5rem; cursor:pointer;" onclick="reroll()">🎲</div>
            <div id="ideaText" style="font-family:'Playfair Display';"></div>
            <div class="btn-stack">
                <button class="btn-modal" style="background:var(--gold); color:white;" onclick="saveTo('done')">זה הדייט שלנו! ✨</button>
                <button class="btn-modal" style="background:var(--bg); color:var(--dark); border:1px solid var(--soft-gold);" onclick="saveTo('maybe')">להוסיף להתלבטויות 🤔</button>
            </div>
        </div>
    </div>

    <div id="doniModal" class="modal">
        <div class="modal-content" style="border-top: 6px solid var(--gold);">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <div style="font-size:3rem;">👑</div>
            <div style="font-family:'Playfair Display'; color:var(--gold); font-size:1.8rem; margin:10px 0;">מסר מהלב לעדן</div>
            <div id="doniText" style="font-style: italic;"></div>
            <button class="btn-modal" style="background:var(--dark); color:var(--gold);" onclick="closeAll()">סגור</button>
        </div>
    </div>

    <div id="listModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <h2 id="listTitle" style="color:var(--gold); font-family:'Playfair Display'; margin-bottom:20px;"></h2>
            <div id="listBody" style="max-height:350px; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        const database = {
            home: ["ערב סושי ויין", "מרתון סרטים", "ספא ביתי", "פיקניק בסלון", "טעימות גבינות", "שיחה מול נרות", "סדנת ציור", "ערב קוקטיילים", "תחרות בישול", "פיצה ביתית מאפס"],
            out: ["מרינה אשקלון בשקיעה", "גן לאומי בלילה", "גלידה בחוף", "בר מקומי", "טיילת אשקלון", "צפייה בכוכבים", "מסעדה איטלקית", "פיקניק בזיקים", "ביקור ביקב"],
            spicy: ["משחק תפקידים ספונטני", "סדנת עיסוי אירוטי", "אמת או חובה נועז", "שימוש באביזרים", "ערב פנטזיות", "ריקוד פרטי ומפתה", "חפש את המטמון בחדר שינה"]
        };

        const doniQuotes = ["דוני, היא הלב של הבית והאמא הכי מדהימה לרום.", "אל תשכח - היא החברה הכי טובה שלך. נשיקה ארוכה!", "תזכורת: היא הכי יפה בעולם בעיניים שלך.", "זכית בכל הקופה, דוני. תראה את המשפחה שבניתם."];
        let quotePool = [...doniQuotes];

        function shareWhatsApp(type) {
            let text = "";
            if(type === 'baby') text = "רום רעב! 🍼 יש להביא מטרנה בהקדם 🍼🍼🍼";
            if(type === 'milk') text = "לא לשכוח להביא חלב בדרך הביתה! 🥛🛒";
            if(type === 'home') text = "מתי הגעה הביתה? יש המתנה בגעגועים! 🏠❤️";
            if(type === 'love') text = "רציתי להגיד שהאהבה כאן היא הכי גדולה בעולם ❤️";
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        let state = JSON.parse(localStorage.getItem('EY_V3_DATA')) || { maybe: [], done: [] };
        let currentCat = '', currentIdea = '', currentListType = '';

        function openGenerator(type) {
            currentCat = type; reroll();
            document.getElementById('genModal').style.display = 'flex';
        }

        function reroll() {
            const list = database[currentCat];
            currentIdea = list[Math.floor(Math.random() * list.length)];
            document.getElementById('ideaText').innerText = currentIdea;
            confetti({ particleCount: 40, colors: ['#D4AF37'], zIndex: 3000 });
        }

        function saveTo(target) {
            if(!state[target].includes(currentIdea)) {
                state[target].push(currentIdea);
                localStorage.setItem('EY_V3_DATA', JSON.stringify(state));
            }
            confetti({ particleCount: 150, shapes: [target==='done'?'heart':'circle'], zIndex: 3000 });
            closeAll();
        }

        function showList(type) {
            currentListType = type;
            document.getElementById('listTitle').innerText = type === 'maybe' ? 'התלבטויות 🤔' : 'הדייטים שלנו 🎬';
            const body = document.getElementById('listBody');
            
            body.innerHTML = state[type].length ? state[type].map((item, i) => `
                <div class="list-item">
                    <span class="delete-btn" onclick="deleteItem(${i})">🗑️</span>
                    <span>${item}</span>
                </div>
            `).join('') : "<p style='text-align:center; opacity:0.5;'>אין כאן כלום עדיין...</p>";
            
            document.getElementById('listModal').style.display = 'flex';
        }

        function deleteItem(index) {
            state[currentListType].splice(index, 1);
            localStorage.setItem('EY_V3_DATA', JSON.stringify(state));
            showList(currentListType);
        }

        function openDoniModal() {
            if (quotePool.length === 0) quotePool = [...doniQuotes];
            const randomIndex = Math.floor(Math.random() * quotePool.length);
            const quote = quotePool.splice(randomIndex, 1)[0];
            document.getElementById('doniText').innerText = quote;
            document.getElementById('doniModal').style.display = 'flex';
        }

        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
