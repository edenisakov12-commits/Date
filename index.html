<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | Luxury Private</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Assistant:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --bg: #fdfaf8; --white: #ffffff; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* Header & Motto */
        .header { padding: 40px 20px 10px; text-align: center; }
        .header h1 { font-family: 'Playfair Display'; font-size: 2.8rem; margin: 0; letter-spacing: -1px; }
        .motto { font-size: 0.9rem; font-style: italic; color: var(--gold); margin-top: 5px; }

        /* Designed Message Box */
        .top-letter-box {
            background: var(--white); border: 1px solid var(--gold); border-radius: 20px;
            margin: 20px auto; width: 85%; padding: 25px; position: relative;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.1); text-align: center;
            min-height: 60px; display: flex; align-items: center; justify-content: center;
        }
        .top-letter-box::before { content: '✉️'; position: absolute; top: -18px; right: calc(50% - 15px); background: var(--bg); padding: 0 12px; font-size: 1.8rem; }
        #top-msg { font-family: 'Playfair Display'; font-style: italic; font-size: 1.2rem; color: var(--dark); line-height: 1.4; }

        /* Main Grid */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 25px; }
        .card { 
            background: var(--white); border-radius: 25px; padding: 40px 10px; text-align: center; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid rgba(212, 175, 55, 0.1);
            transition: 0.3s;
        }
        .card:active { transform: scale(0.95); }
        .card .emoji { font-size: 2.8rem; display: block; margin-bottom: 12px; }
        .card span { font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; color: var(--dark); }

        /* Yarden Floating Button */
        .yarden-floating {
            position: fixed; bottom: 110px; left: 25px; background: var(--dark);
            color: var(--gold); border: 1px solid var(--gold); padding: 14px 22px;
            border-radius: 50px; font-weight: bold; font-size: 0.85rem; z-index: 99; 
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Modals */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content { 
            background: var(--white); width: 88%; max-width: 400px; border-radius: 35px; 
            padding: 35px; text-align: center; position: relative; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .close-btn { position: absolute; top: 20px; left: 25px; font-size: 1.5rem; cursor: pointer; color: var(--gold); }
        
        .idea-display { font-family: 'Playfair Display'; font-size: 1.7rem; margin: 35px 0; min-height: 120px; display: flex; align-items: center; justify-content: center; line-height: 1.4; color: var(--dark); }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-dark { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); padding: 16px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .btn-text { background: none; color: #888; border: none; padding: 10px; cursor: pointer; font-size: 0.9rem; text-decoration: underline; }

        /* Lists */
        .list-wrapper { max-height: 300px; overflow-y: auto; text-align: right; margin-top: 20px; }
        .list-entry { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .delete-btn { color: #ff4d4d; font-size: 1rem; cursor: pointer; padding: 5px; }

        /* Navigation */
        .nav-container {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: var(--dark); display: flex; justify-content: space-around;
            padding: 18px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .nav-link { color: #666; text-align: center; cursor: pointer; font-size: 0.75rem; transition: 0.3s; text-decoration: none; }
        .nav-link.active { color: var(--gold); }
        .nav-link span { display: block; font-size: 1.6rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Eden & Yarden</h1>
        <p class="motto">"מקום שבו האהבה שלנו ממשיכה לצמוח"</p>
    </div>

    <div class="top-letter-box">
        <div id="top-msg">טוען הודעה מהלב... ✨</div>
    </div>

    <div class="main-grid">
        <div class="card" onclick="openGen('home')">
            <span class="emoji">🏡</span><span>דייט בבית</span>
        </div>
        <div class="card" onclick="openGen('out')">
            <span class="emoji">🥂</span><span>יוצאים בחוץ</span>
        </div>
    </div>

    <button class="yarden-floating" onclick="yardenInspiration()">לעיני ירדן בלבד 🔐</button>

    <div id="genModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <h2 id="genTitle" style="color:var(--gold); font-family:'Playfair Display'; margin-bottom:0;">רעיון לדייט</h2>
            <div class="idea-display" id="ideaText">מחפשים לכם רעיון...</div>
            <div class="btn-group">
                <button class="btn-dark" onclick="rerollIdea()">הגרלה אחרת 🎲</button>
                <button class="btn-dark" onclick="saveData('maybe')">להוסיף להתלבטויות 🤔</button>
                <button class="btn-gold" onclick="saveData('done')">את זה אנחנו רוצים! ✨</button>
            </div>
        </div>
    </div>

    <div id="listModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAll()">✕</span>
            <h2 id="listTitle" style="color:var(--gold); font-family:'Playfair Display';">הרשימה שלנו</h2>
            <div id="listBody" class="list-wrapper"></div>
            <button class="btn-text" onclick="clearList()">איפוס כל הרשימה</button>
        </div>
    </div>

    <nav class="nav-container">
        <div class="nav-link active" onclick="location.reload()"><span>🏠</span>בית</div>
        <div class="nav-link" onclick="viewList('maybe')"><span>🤔</span>התלבטויות</div>
        <div class="nav-link" onclick="viewList('done')"><span>🎬</span>הדייטים שלנו</div>
        <div class="nav-item nav-link" onclick="writeNewLetter()"><span>📝</span>מכתב</div>
    </nav>

    <script>
        const dateDatabase = {
            home: ["סדנת שוקולד ויין בסלון", "ערב קוקטיילים ותחרות בישול", "מרתון סרטים עם פופקורן גורמה", "ערב שאלות עומק לזוגיות", "ספא ביתי עם עיסויים", "בניית לוח חזון לעשור הבא", "סדנת ציור זוגית על קנבס"],
            out: ["טיול יקבים וטעימות גבינות", "טיסת חוויה בשמי הארץ", "סיור קולינרי בשוק בלילה", "לילה בצימר בוטיק מבודד", "הופעה חיה תחת כיפת השמיים", "פיקניק שקיעה על צוק בים", "טיול סוסים רומנטי בשקיעה"]
        };

        const yardenQuotes = [
            "ירדן, תסתכל עליה - היא האישה הכי יפה בעולם. תגיד לה את זה עכשיו. ❤️",
            "תזכורת: לקנות זר פרחים קטן בדרך הביתה, סתם כי היא מושלמת. 💐",
            "תביא לה חיבוק ארוך של 20 שניות, זה כל מה שהיא צריכה. 🫂",
            "שלח לה עכשיו הודעה: 'זכיתי בך כאשתי, את חכמה ומיוחדת'. 📱",
            "נשיקה על המצח וסידור הבית - זה הדייט הכי טוב. 💋"
        ];

        let appState = { maybe: [], done: [], lastMsg: "עדן ❤️ ירדן" };
        let currentCategory = '', currentActiveIdea = '';

        // 🔐 Security Logic
        function getAuth() {
            let k = localStorage.getItem('APP_K'), b = localStorage.getItem('APP_B');
            if (!k) { k = prompt("נא להזין API KEY (חד-פעמי):"); if(k) localStorage.setItem('APP_K', k); }
            if (!b) { b = prompt("נא להזין BIN ID (חד-פעמי):"); if(b) localStorage.setItem('APP_B', b); }
            return { apiKey: k, binId: b };
        }

        async function loadFromCloud() {
            const { apiKey, binId } = getAuth();
            if(!apiKey || !binId) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    headers: { 'X-Master-Key': apiKey }
                });
                const data = await res.json();
                appState = data.record;
                renderUI();
            } catch (e) { console.error("Sync failed"); }
        }

        async function saveToCloud() {
            const { apiKey, binId } = getAuth();
            await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
                body: JSON.stringify(appState)
            });
            renderUI();
        }

        function renderUI() {
            document.getElementById('top-msg').innerText = appState.lastMsg;
        }

        // Interaction Logic
        function openGen(type) {
            currentCategory = type;
            rerollIdea();
            document.getElementById('genModal').style.display = 'flex';
        }

        function rerollIdea() {
            const options = dateDatabase[currentCategory];
            currentActiveIdea = options[Math.floor(Math.random() * options.length)];
            document.getElementById('ideaText').innerText = currentActiveIdea;
            confetti({ particleCount: 30, spread: 50, colors: ['#D4AF37'] });
        }

        function saveData(target) {
            if(!appState[target].includes(currentActiveIdea)) {
                appState[target].push(currentActiveIdea);
            }
            if(target === 'done') {
                confetti({ particleCount: 150, spread: 70, shapes: ['heart'], colors: ['#D4AF37', '#ff0000'] });
            } else {
                confetti({ particleCount: 50, spread: 40, scalar: 2, shapes: ['circle'] });
            }
            saveToCloud();
            closeAll();
        }

        function viewList(type) {
            currentCategory = type;
            document.getElementById('listTitle').innerText = type === 'maybe' ? 'התלבטויות' : 'הדייטים שלנו';
            const body = document.getElementById('listBody');
            body.innerHTML = appState[type].length ? appState[type].map((item, i) => `
                <div class="list-entry">
                    <span>${item}</span>
                    <span class="delete-btn" onclick="removeItem(${i})">🗑️</span>
                </div>
            `).join('') : '<p style="text-align:center; opacity:0.5">אין פריטים ברשימה...</p>';
            document.getElementById('listModal').style.display = 'flex';
        }

        function removeItem(i) {
            appState[currentCategory].splice(i, 1);
            saveToCloud();
            viewList(currentCategory);
        }

        function writeNewLetter() {
            const m = prompt("כתבי הודעה אישית שתופיע למעלה:");
            if(m) {
                appState.lastMsg = m;
                saveToCloud();
            }
        }

        function yardenInspiration() {
            const q = yardenQuotes[Math.floor(Math.random() * yardenQuotes.length)];
            alert(q);
            confetti({ particleCount: 100, shapes: ['heart'], colors: ['#ff0000'] });
        }

        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function clearList() { if(confirm("למחוק את כל הרשימה הזו?")) { appState[currentCategory] = []; saveToCloud(); viewList(currentCategory); } }

        loadFromCloud();
    </script>
</body>
</html>
